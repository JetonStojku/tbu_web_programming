{% extends "blog/base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="card-title">Edit Comment</h3>
        <p class="text-muted">Movie: <strong>{{ movie.title }}</strong></p>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            {{ form.content }}
            {% if form.content.errors %}
            <div class="text-danger small mt-1">{{ form.content.errors }}</div>
            {% endif %}
          </div>
          <div class="d-flex gap-2">
            <a href="{% url 'movie-detail' movie.pk %}" class="btn btn-outline-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Update Comment</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
