{% extends "blog/base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card shadow-sm border-danger">
      <div class="card-body">
        <h3 class="card-title text-danger">Delete Movie</h3>
        <p>Are you sure you want to delete <strong>{{ object.title }}</strong>?</p>
        <p class="text-muted mb-4">This will also remove its gallery images, ratings, and comments.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <a href="{% url 'movie-detail' object.pk %}" class="btn btn-outline-secondary">Cancel</a>
            <button type="submit" class="btn btn-danger">Delete Movie</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
